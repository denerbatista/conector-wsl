name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    name: Build .mcpb
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pack .mcpb
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conector-wsl-${{ github.sha }}
          path: "*.mcpb"
          if-no-files-found: error
